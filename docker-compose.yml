services:
  mongodb:
    image: mongo:7
    container_name: taskflow-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskflow_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: taskflow-api:latest
    container_name: taskflow-api
    restart: unless-stopped
    environment:
      PORT: ${PORT:-5000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/taskflow}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskflow_net

  nginx:
    image: nginx:1.27-alpine
    container_name: taskflow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - taskflow_net

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: taskflow-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WORKSPACE_HOST_PATH:-./}:/workspace
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true"
    networks:
      - taskflow_net

networks:
  taskflow_net:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  jenkins_home:
    driver: local
